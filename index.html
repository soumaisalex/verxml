<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador DANFE - Alex Passos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos de Impressão */
        @media print {
            body { background: white !important; padding: 0 !important; }
            .no-print { display: none !important; }
            #danfe-content { 
                border: none !important; 
                box-shadow: none !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 0 !important;
            }
            .danfe-page { box-shadow: none !important; }
        }

        /* Estilos de Visualização */
        .danfe-box { border: 1px solid #000; padding: 3px 6px; margin-bottom: -1px; }
        .label { font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; color: #333; }
        .value { font-size: 12px; min-height: 15px; font-weight: 500; }
        
        .danfe-table th, .danfe-table td { 
            border: 1px solid #000; 
            font-size: 11px; 
            padding: 4px; 
            text-transform: uppercase; 
        }

        .floating-btn { 
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.2s; cursor: pointer; 
        }
        .floating-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans pb-10">

    <div id="controls" class="fixed top-5 right-5 flex flex-col gap-3 no-print z-50 hidden">
        <button onclick="window.print()" class="floating-btn bg-blue-600 text-white" title="Imprimir">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        </button>
        <button onclick="fecharNota()" class="floating-btn bg-gray-800 text-white" title="Fechar">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div id="drop-zone" class="max-w-4xl mx-auto mt-20 bg-white border-4 border-dashed border-gray-400 rounded-xl p-20 text-center no-print cursor-pointer hover:bg-gray-50 transition-all">
        <p class="text-2xl text-gray-600 font-bold">Solte o XML da Nota Fiscal aqui</p>
        <p class="text-gray-400 mt-2">Ou clique para selecionar o arquivo</p>
        <input type="file" id="file-input" class="hidden" accept=".xml">
    </div>

    <div id="danfe-content" class="max-w-[210mm] mx-auto bg-white p-5 shadow-2xl mt-5 hidden overflow-hidden">
        </div>

    <footer class="mt-10 text-center no-print text-gray-600 text-sm">
        Desenvolvido por: 
        <a href="https://instagram.com/soumaisalex" target="_blank" class="font-bold text-gray-600 hover:text-black transition-colors">
            Alex Passos
        </a>
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const content = document.getElementById('danfe-content');
        const controls = document.getElementById('controls');

        dropZone.onclick = () => fileInput.click();
        window.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50'); };
        window.ondragleave = () => dropZone.classList.remove('bg-blue-50');
        window.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function fecharNota() {
            content.innerHTML = '';
            content.classList.add('hidden');
            controls.classList.add('hidden');
            dropZone.classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function handleFile(file) {
            if (!file || !file.name.endsWith('.xml')) return alert("Arquivo inválido!");
            const reader = new FileReader();
            reader.onload = (e) => parseXML(e.target.result);
            reader.readAsText(file);
        }

        function parseXML(xmlString) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlString, "text/xml");
            const get = (tag, parent = xml) => parent.getElementsByTagName(tag)[0]?.textContent || "";

            const emit = {
                nome: get("xNome"), cnpj: get("CNPJ"), ie: get("IE"), 
                rua: get("xLgr"), n: get("nro"), bairro: get("xBairro"), mun: get("xMun"), uf: get("UF")
            };
            const destNode = xml.getElementsByTagName("dest")[0];
            const dest = {
                nome: get("xNome", destNode),
                doc: get("CNPJ", destNode) || get("CPF", destNode),
                ie: get("IE", destNode),
                rua: get("xLgr", destNode),
                n: get("nro", destNode),
                uf: get("UF", destNode)
            };

            const ide = { nNF: get("nNF"), serie: get("serie"), chave: get("chNFe"), dEmi: get("dhEmi").substring(0,10) };
            const totais = { vProd: get("vProd"), vNF: get("vNF"), vFrete: get("vFrete") || "0,00" };

            dropZone.classList.add('hidden');
            controls.classList.remove('hidden');
            content.classList.remove('hidden');

            content.innerHTML = `
                <div class="danfe-page">
                    <div class="flex">
                        <div class="w-1/2 danfe-box">
                            <span class="label">Identificação do Emitente</span>
                            <p class="font-bold text-base uppercase leading-tight">${emit.nome}</p>
                            <p class="text-xs">${emit.rua}, ${emit.n} - ${emit.bairro}</p>
                            <p class="text-xs">${emit.mun} - ${emit.uf} | CNPJ: ${emit.cnpj}</p>
                        </div>
                        <div class="w-[120px] danfe-box text-center flex flex-col justify-center">
                            <span class="label">DANFE</span>
                            <p class="text-[10px]">Doc. Auxiliar da NF-e</p>
                            <p class="font-bold text-xl mt-1">1</p>
                            <p class="text-[9px]">SAÍDA</p>
                        </div>
                        <div class="flex-1 danfe-box">
                            <span class="label">Nº: ${ide.nNF} | SÉRIE: ${ide.serie}</span>
                            <span class="label mt-2">Chave de Acesso</span>
                            <p class="text-[11px] font-mono break-all mt-1">${ide.chave.replace(/(.{4})/g, '$1 ')}</p>
                        </div>
                    </div>

                    <div class="mt-3 text-center font-bold text-[10px] bg-gray-100 border border-black uppercase py-1">Destinatário / Remetente</div>
                    <div class="flex">
                        <div class="flex-1 danfe-box"><span class="label">Nome / Razão Social</span><p class="value">${dest.nome}</p></div>
                        <div class="w-1/3 danfe-box"><span class="label">CNPJ/CPF</span><p class="value">${dest.doc}</p></div>
                        <div class="w-32 danfe-box"><span class="label">Data Emissão</span><p class="value">${ide.dEmi}</p></div>
                    </div>
                    <div class="flex">
                        <div class="flex-1 danfe-box"><span class="label">Endereço</span><p class="value">${dest.rua}, ${dest.n}</p></div>
                        <div class="w-1/3 danfe-box"><span class="label">UF</span><p class="value">${dest.uf}</p></div>
                        <div class="w-32 danfe-box"><span class="label">Inscrição Estadual</span><p class="value">${dest.ie}</p></div>
                    </div>

                    <div class="mt-3 text-center font-bold text-[10px] bg-gray-100 border border-black uppercase py-1">Fatura / Duplicatas</div>
                    <div id="dups" class="flex flex-wrap border border-black p-2 min-h-[40px]"></div>

                    <div class="mt-3 text-center font-bold text-[10px] bg-gray-100 border border-black uppercase py-1">Cálculo do Imposto</div>
                    <div class="flex text-right">
                        <div class="flex-1 danfe-box"><span class="label">Base de Cálculo ICMS</span><p class="value">R$ ${get("vBC")}</p></div>
                        <div class="flex-1 danfe-box"><span class="label">Valor do ICMS</span><p class="value">R$ ${get("vICMS")}</p></div>
                        <div class="flex-1 danfe-box"><span class="label">V. Total Produtos</span><p class="value font-bold">R$ ${totais.vProd}</p></div>
                        <div class="flex-1 danfe-box bg-gray-50"><span class="label">V. Total da Nota</span><p class="value font-bold text-lg">R$ ${totais.vNF}</p></div>
                    </div>

                    <div class="mt-3 text-center font-bold text-[10px] bg-gray-100 border border-black uppercase py-1">Transportadora / Volumes</div>
                    <div class="flex">
                        <div class="flex-1 danfe-box"><span class="label">Razão Social</span><p class="value">${get("xNome", xml.getElementsByTagName("transporta")[0]) || "O MESMO"}</p></div>
                        <div class="w-40 danfe-box"><span class="label">Frete por conta</span><p class="value">${get("modFrete") == "0" ? "REMETENTE" : "DESTINATÁRIO"}</p></div>
                    </div>
                    <div class="flex">
                        <div class="w-24 danfe-box"><span class="label">Quantidade</span><p class="value">${get("qVol") || "0"}</p></div>
                        <div class="flex-1 danfe-box"><span class="label">Espécie</span><p class="value">${get("esp") || "-"}</p></div>
                        <div class="flex-1 danfe-box"><span class="label">Peso Bruto</span><p class="value">${get("pesoB") || "0.000"}</p></div>
                    </div>

                    <div class="mt-3">
                        <table class="w-full danfe-table border-collapse">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th width="10%">Cód.</th>
                                    <th width="45%">Descrição</th>
                                    <th width="10%">NCM</th>
                                    <th width="8%">Qtd</th>
                                    <th width="7%">Un</th>
                                    <th width="10%">V. Unit</th>
                                    <th width="10%">V. Total</th>
                                </tr>
                            </thead>
                            <tbody id="itens-list"></tbody>
                        </table>
                    </div>
                </div>
            `;

            const itens = xml.getElementsByTagName("det");
            const list = document.getElementById("itens-list");
            Array.from(itens).forEach(i => {
                const prod = i.getElementsByTagName("prod")[0];
                const row = list.insertRow();
                row.innerHTML = `
                    <td class="text-center">${get("cProd", prod)}</td>
                    <td>${get("xProd", prod)}</td>
                    <td class="text-center">${get("NCM", prod)}</td>
                    <td class="text-center">${get("qCom", prod)}</td>
                    <td class="text-center">${get("uCom", prod)}</td>
                    <td class="text-right">${get("vUnCom", prod)}</td>
                    <td class="text-right font-bold">${get("vProd", prod)}</td>
                `;
            });

            const duplicatas = xml.getElementsByTagName("dup");
            const dCont = document.getElementById("dups");
            if(duplicatas.length === 0) dCont.innerHTML = '<span class="text-xs italic">Pagamento à vista / Sem duplicatas</span>';
            Array.from(duplicatas).forEach(d => {
                const dv = document.createElement("div");
                dv.className = "border border-gray-300 p-2 mr-3 mb-1 min-w-[120px]";
                dv.innerHTML = `<span class="label">Venc: ${get("dVenc", d)}</span><p class="value font-bold">R$ ${get("vDup", d)}</p>`;
                dCont.appendChild(dv);
            });
        }
    </script>
</body>
</html>
